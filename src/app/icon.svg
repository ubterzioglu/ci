<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Yin-yang in Çi olive (#5a6240) and white, white edges throughout. -->
  <!-- Base disc: white half (left) + outer white border ring. -->
  <circle cx="32" cy="32" r="30" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
  <!-- Olive half: right semicircle down, swinging back up through the centre
       via two half-turns to form the interlocking S-curve. -->
  <path
    d="M32 2
       A30 30 0 0 1 32 62
       A15 15 0 0 1 32 32
       A15 15 0 0 0 32 2 Z"
    fill="#5a6240"/>
  <!-- Eyes: olive dot in the white half, white dot in the olive half,
       each ringed in white. -->
  <circle cx="32" cy="17" r="6" fill="#5a6240" stroke="#ffffff" stroke-width="2"/>
  <circle cx="32" cy="47" r="6" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
</svg>
